name: Deploy — Terraform Apply + Frontend a S3

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.9.8"
  TERRAGRUNT_VERSION: "0.67.16"
  NODE_VERSION: "20"
  S3_BUCKET: odontoval-site-prod
  CF_DISTRIBUTION_ID: ""   # se completa después del primer apply

jobs:
  # ─────────────────────────────────────────────
  # Infraestructura: Terraform Apply
  # ─────────────────────────────────────────────
  infra:
    name: Infraestructura — Terraform Apply
    runs-on: ubuntu-latest
    environment: production   # requiere aprobación manual en GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Instalar Terragrunt
        run: |
          wget -q https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Terragrunt apply (todos los módulos)
        working-directory: terraform/live/prod
        run: |
          terragrunt run-all apply \
            --terragrunt-non-interactive \
            -auto-approve
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_twilio_account_sid: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TF_VAR_twilio_auth_token: ${{ secrets.TWILIO_AUTH_TOKEN }}

  # ─────────────────────────────────────────────
  # Frontend: Build y deploy a S3
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend — Build y Deploy
    runs-on: ubuntu-latest
    needs: infra

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Build de producción
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: auth.odontoval.com.ec

      - name: Sincronizar con S3
        run: |
          # Archivos con hash en el nombre → caché agresivo (1 año)
          aws s3 sync frontend/dist/ s3://${{ env.S3_BUCKET }}/ \
            --exclude "index.html" \
            --exclude "manifest.json" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

          # index.html y manifest → sin caché para que siempre cargue la versión nueva
          aws s3 cp frontend/dist/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
          aws s3 cp frontend/dist/manifest.json s3://${{ env.S3_BUCKET }}/manifest.json \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidar caché CloudFront
        run: |
          # Obtener el ID de la distribución desde el output de Terraform
          CF_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='odontoval-prod'].Id" \
            --output text)

          if [ -n "$CF_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$CF_ID" \
              --paths "/*"
            echo "Invalidación creada para distribución $CF_ID"
          else
            echo "No se encontró la distribución CloudFront"
            exit 1
          fi

  # ─────────────────────────────────────────────
  # Backend: Empaquetar y subir Lambdas
  # ─────────────────────────────────────────────
  backend:
    name: Backend — Deploy Lambdas
    runs-on: ubuntu-latest
    needs: infra

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias en carpeta de empaquetado
        working-directory: backend
        run: |
          mkdir -p package
          pip install -r requirements.txt --target package/ --upgrade
          cp -r src/* package/

      - name: Crear ZIP del deployment package
        working-directory: backend
        run: |
          cd package
          zip -r ../backend.zip .
          cd ..
          ls -lh backend.zip

      - name: Actualizar código de cada Lambda
        working-directory: backend
        run: |
          for fn in odontoval-prod-pacientes \
                    odontoval-prod-odontogramas \
                    odontoval-prod-citas \
                    odontoval-prod-facturas \
                    odontoval-prod-radiografias \
                    odontoval-prod-reminders \
                    odontoval-prod-profilaxis; do
            echo "Actualizando $fn..."
            aws lambda update-function-code \
              --function-name "$fn" \
              --zip-file fileb://backend.zip \
              --no-cli-pager || echo "Lambda $fn no encontrada (puede no estar desplegada aún)"
          done

      - name: Esperar publicación y verificar funciones críticas
        run: |
          for fn in odontoval-prod-pacientes \
                    odontoval-prod-citas \
                    odontoval-prod-radiografias; do
            echo "Verificando estado de $fn..."
            aws lambda wait function-updated \
              --function-name "$fn" \
              --no-cli-pager || true
          done
          echo "Todas las Lambdas actualizadas."
