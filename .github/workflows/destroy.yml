name: Destroy — Terraform (solo módulos app_odontograma)

on:
  workflow_dispatch:
    inputs:
      modulo:
        description: "Módulo a destruir (o 'all' para todos en orden)"
        required: true
        type: choice
        options:
          - all
          - scheduler
          - api
          - storage
          - database
          - auth
      confirmar:
        description: "Escribe DESTRUIR para confirmar"
        required: true
        type: string

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.9.8"
  TERRAGRUNT_VERSION: "0.67.16"

jobs:
  validar:
    name: Validar confirmación
    runs-on: ubuntu-latest
    steps:
      - name: Verificar palabra de confirmación
        run: |
          if [ "${{ github.event.inputs.confirmar }}" != "DESTRUIR" ]; then
            echo "❌ Confirmación incorrecta. Escribe exactamente: DESTRUIR"
            exit 1
          fi
          echo "✅ Confirmación aceptada"

  destroy:
    name: Terraform Destroy — ${{ github.event.inputs.modulo }}
    runs-on: ubuntu-latest
    needs: validar
    environment: production   # requiere aprobación manual en GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Instalar Terragrunt
        run: |
          wget -q https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      # ── Destroy por módulo individual ──────────────────────────────
      - name: Destroy — scheduler
        if: github.event.inputs.modulo == 'scheduler' || github.event.inputs.modulo == 'all'
        working-directory: terraform/live/prod/scheduler
        run: terragrunt destroy -auto-approve --terragrunt-non-interactive
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_twilio_account_sid: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TF_VAR_twilio_auth_token: ${{ secrets.TWILIO_AUTH_TOKEN }}

      - name: Destroy — api
        if: github.event.inputs.modulo == 'api' || github.event.inputs.modulo == 'all'
        working-directory: terraform/live/prod/api
        run: terragrunt destroy -auto-approve --terragrunt-non-interactive
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      - name: Destroy — storage
        if: github.event.inputs.modulo == 'storage' || github.event.inputs.modulo == 'all'
        working-directory: terraform/live/prod/storage
        run: terragrunt destroy -auto-approve --terragrunt-non-interactive

      - name: Destroy — database
        if: github.event.inputs.modulo == 'database' || github.event.inputs.modulo == 'all'
        working-directory: terraform/live/prod/database
        run: terragrunt destroy -auto-approve --terragrunt-non-interactive
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_vpc_id: ${{ secrets.VPC_ID }}
          TF_VAR_private_subnet_ids: ${{ secrets.PRIVATE_SUBNET_IDS }}

      - name: Destroy — auth
        if: github.event.inputs.modulo == 'auth' || github.event.inputs.modulo == 'all'
        working-directory: terraform/live/prod/auth
        run: terragrunt destroy -auto-approve --terragrunt-non-interactive
        env:
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      # ── Resumen ────────────────────────────────────────────────────
      - name: Resumen
        if: always()
        run: |
          echo "## 🗑️ Destroy completado" >> $GITHUB_STEP_SUMMARY
          echo "**Módulo:** ${{ github.event.inputs.modulo }}" >> $GITHUB_STEP_SUMMARY
          echo "**Ejecutado por:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Fecha:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ Los módulos **dns**, **static-site** y **email** NO fueron afectados." >> $GITHUB_STEP_SUMMARY
