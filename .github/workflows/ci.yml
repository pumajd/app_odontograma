name: CI — Lint, Test y Terraform Plan

on:
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.9.8"
  TERRAGRUNT_VERSION: "0.67.16"
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  # ─────────────────────────────────────────────
  # Frontend: lint y build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend — Lint y Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build de producción
        working-directory: frontend
        run: npm run build

  # ─────────────────────────────────────────────
  # Backend: lint y tests unitarios
  # ─────────────────────────────────────────────
  backend:
    name: Backend — Lint y Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Lint con flake8
        working-directory: backend
        run: |
          pip install flake8
          flake8 src/ --max-line-length=120 --exclude=__pycache__

      - name: Tests unitarios
        working-directory: backend
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # Terraform: plan de módulos modificados
  # ─────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    permissions:
      contents: read
      pull-requests: write   # para comentar el plan en el PR

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS (solo lectura para plan)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Instalar Terragrunt
        run: |
          wget -q https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terragrunt validate (todos los módulos)
        working-directory: terraform/live/prod
        run: terragrunt run-all validate --terragrunt-non-interactive

      - name: Terragrunt plan
        id: plan
        working-directory: terraform/live/prod
        run: |
          terragrunt run-all plan \
            --terragrunt-non-interactive \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      - name: Comentar plan en PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/live/prod/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(-60000) + '\n...(truncado)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📋 Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });
